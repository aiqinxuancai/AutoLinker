name: MSBuild

on: 
  push:
    tags:
    - '*'

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: fne_release
  BUILD_PLATFORM: x86
  LANG: zh_CN.UTF-8
  MIRROR_RELEASE_OWNER: aiqinxuancai
  MIRROR_RELEASE_REPO: AutoLinker

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Set System Locale to Chinese
      run: |
        Set-WinSystemLocale zh-CN

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Resolve Release Meta
      id: release_meta
      shell: pwsh
      run: |
        $rawTag = "${{ github.ref_name }}"
        $versionLabel = $rawTag
        if ($versionLabel.StartsWith("v") -or $versionLabel.StartsWith("V")) {
          $versionLabel = $versionLabel.Substring(1)
        }

        $coreVersion = $versionLabel -replace '[-+].*$', ''
        if ($coreVersion -notmatch '^\d+(?:\.\d+){1,3}$') {
          throw "Invalid release tag format: $rawTag"
        }

        $isPrerelease = $versionLabel -match '(?i)(?:^|[-.])(alpha|beta|pre|preview|rc)(?:[.-]?\d*)?(?:$|[-.])'
        $makeLatest = if ($isPrerelease) { 'false' } else { 'legacy' }

        Add-Content -Path $env:GITHUB_OUTPUT -Value "raw_tag=$rawTag"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "version_label=$versionLabel"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "version_core=$coreVersion"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "prerelease=$($isPrerelease.ToString().ToLowerInvariant())"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "make_latest=$makeLatest"

        Write-Output "raw_tag=$rawTag"
        Write-Output "version_label=$versionLabel"
        Write-Output "version_core=$coreVersion"
        Write-Output "prerelease=$($isPrerelease.ToString().ToLowerInvariant())"
        Write-Output "make_latest=$makeLatest"

    - name: Set Version
      shell: pwsh
      run: |
        $versionLabel = "${{ steps.release_meta.outputs.version_label }}"
        $coreVersion = "${{ steps.release_meta.outputs.version_core }}"

        $versionFile = Get-Content "./src/AutoLinkerVersion.h" -Encoding utf8BOM -Raw
        $versionFile = $versionFile -replace '#define AUTOLINKER_VERSION ".*?"', ('#define AUTOLINKER_VERSION "' + $coreVersion + '"')
        Set-Content "./src/AutoLinkerVersion.h" -Value $versionFile -Encoding utf8BOM

        $headerFile = Get-Content "./src/AutoLinker.h" -Encoding utf8BOM -Raw
        $headerFile = $headerFile -replace "0\.0\.0", $versionLabel
        Set-Content "./src/AutoLinker.h" -Value $headerFile -Encoding utf8BOM

        Get-Content "./src/AutoLinkerVersion.h" -Encoding utf8BOM | Out-String | Write-Output
        Get-Content "./src/AutoLinker.h" -Encoding utf8BOM | Select-String -Pattern "AUTOLINKER_VERSION|LIB_DESCRIPTION_STR|LIB_BuildNumber" | Out-String | Write-Output

    - name: Set Build
      shell: pwsh
      run: |
        (Get-Content "./src/AutoLinker.h" -Encoding utf8BOM -Raw) |
        ForEach-Object { $_ -replace "1000000", "$env:GITHUB_RUN_NUMBER" } |
        Set-Content "./src/AutoLinker.h" -Encoding utf8BOM
        Get-Content "./src/AutoLinker.h" -Encoding utf8BOM | Out-String | Write-Output

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        msbuild ${{env.SOLUTION_FILE_PATH}}/AutoLinker.vcxproj -t:rebuild -verbosity:normal -property:Configuration=${{env.BUILD_CONFIGURATION}} -property:Platform=${{env.BUILD_PLATFORM}}

    - name: Compress-Archive
      run: |
        powershell Compress-Archive -Path "bin/${{env.BUILD_CONFIGURATION}}/AutoLinker.fne" -DestinationPath "AutoLinker-${{steps.release_meta.outputs.version_label}}.zip"

    - name: Generate AI Release Notes
      shell: pwsh
      env:
        RELEASE_TAG: ${{ steps.release_meta.outputs.raw_tag }}
        RELEASE_NAME: AutoLinker ${{ steps.release_meta.outputs.version_label }}
        AI_NOTES_API_KEY: ${{ secrets.AI_NOTES_API_KEY }}
        AI_NOTES_BASE_URL: ${{ vars.AI_NOTES_BASE_URL }}
        AI_NOTES_MODEL: ${{ vars.AI_NOTES_MODEL }}
      run: |
        ./scripts/generate_ai_release_notes.ps1 -OutputPath release_notes.md
        Get-Content release_notes.md -Encoding utf8BOM | Out-String | Write-Output

    - name: Create a Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.release_meta.outputs.raw_tag }}
        name: AutoLinker ${{ steps.release_meta.outputs.version_label }}
        artifacts: "AutoLinker-${{steps.release_meta.outputs.version_label}}.zip"
        bodyFile: release_notes.md
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        makeLatest: ${{ steps.release_meta.outputs.make_latest }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Resolve Mirror Release Target
      id: mirror_repo_meta
      shell: pwsh
      env:
        MIRROR_TOKEN: ${{ secrets.AUTOLINKER_MIRROR_RELEASE_TOKEN }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:MIRROR_TOKEN)) {
          throw "Missing AUTOLINKER_MIRROR_RELEASE_TOKEN secret. It must have Contents: write permission for $env:MIRROR_RELEASE_OWNER/$env:MIRROR_RELEASE_REPO."
        }

        $headers = @{
          Accept = "application/vnd.github+json"
          Authorization = "Bearer $env:MIRROR_TOKEN"
          "X-GitHub-Api-Version" = "2022-11-28"
          "User-Agent" = "AutoLinkerP-release-mirror"
        }
        $repo = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:MIRROR_RELEASE_OWNER/$env:MIRROR_RELEASE_REPO" -Headers $headers
        if ([string]::IsNullOrWhiteSpace($repo.default_branch)) {
          throw "Unable to resolve default branch for $env:MIRROR_RELEASE_OWNER/$env:MIRROR_RELEASE_REPO."
        }

        Add-Content -Path $env:GITHUB_OUTPUT -Value "default_branch=$($repo.default_branch)"
        Write-Output "mirror_target=$env:MIRROR_RELEASE_OWNER/$env:MIRROR_RELEASE_REPO@$($repo.default_branch)"

    - name: Mirror Release to AutoLinker
      uses: ncipollo/release-action@v1
      with:
        owner: ${{ env.MIRROR_RELEASE_OWNER }}
        repo: ${{ env.MIRROR_RELEASE_REPO }}
        tag: ${{ steps.release_meta.outputs.raw_tag }}
        commit: ${{ steps.mirror_repo_meta.outputs.default_branch }}
        name: AutoLinker ${{ steps.release_meta.outputs.version_label }}
        artifacts: "AutoLinker-${{steps.release_meta.outputs.version_label}}.zip"
        bodyFile: release_notes.md
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        makeLatest: ${{ steps.release_meta.outputs.make_latest }}
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.AUTOLINKER_MIRROR_RELEASE_TOKEN }}
