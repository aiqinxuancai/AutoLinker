<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
	margin: 0;
	padding: 0;
	background: #ffffff;
	color: #222;
	font: 13px/1.6 "Microsoft YaHei UI", "Segoe UI", sans-serif;
}

body {
	padding: 0;
}

.layout {
	display: flex;
	flex-direction: column;
	height: 100vh;
	box-sizing: border-box;
}

.history {
	flex: 1 1 auto;
	overflow: auto;
	padding: 10px 10px 8px 10px;
	box-sizing: border-box;
	font-size: 12px;
}

#chat-root {
	min-height: 100%;
}

.composer {
	flex: 0 0 auto;
	border-top: 1px solid #d9d9d9;
	background: #fbfbfb;
	padding: 8px 10px 10px 10px;
	box-sizing: border-box;
	position: relative;
}

.actions {
	display: flex;
	justify-content: space-between;
	align-items: flex-end;
	gap: 8px;
}

.left-actions,
.right-actions {
	display: flex;
	align-items: center;
	gap: 8px;
}

.right-actions {
	margin-left: auto;
}

.context-usage {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-width: 76px;
	height: 30px;
	border: 1px solid #d2d7de;
	border-radius: 6px;
	background: #fff;
	color: #4b5563;
	font: 12px/1 "Microsoft YaHei UI", "Segoe UI", sans-serif;
	white-space: nowrap;
	padding: 0 8px;
	box-sizing: border-box;
}

.context-usage.warn {
	border-color: #e0a83a;
	color: #8a5a00;
	background: #fff8e6;
}

.context-usage.danger {
	border-color: #d96c61;
	color: #9f1f17;
	background: #fff1f0;
}

.input-wrap {
	display: flex;
	flex-direction: column;
	gap: 8px;
}

.mcp-guide {
	font-size: 12px;
	line-height: 1.35;
	text-align: left;
}

.mcp-guide a {
	display: block;
	color: #0b63c9;
	text-decoration: none;
}

.mcp-guide a:hover {
	text-decoration: underline;
}

#chat-input {
	width: 100%;
	min-height: 58px;
	max-height: 160px;
	resize: vertical;
	box-sizing: border-box;
	border: 1px solid #cfcfcf;
	border-radius: 6px;
	padding: 8px 10px;
	font: 13px/1.5 "Microsoft YaHei UI", "Segoe UI", sans-serif;
	outline: none;
	background: #fff;
}

#chat-input:focus {
	border-color: #7aa7e0;
	box-shadow: 0 0 0 2px rgba(64, 127, 214, .12);
}

.btn {
	border: 1px solid #c8c8c8;
	background: #fff;
	border-radius: 6px;
	padding: 6px 12px;
	font: 12px "Microsoft YaHei UI", "Segoe UI", sans-serif;
	cursor: pointer;
}

.btn.primary {
	background: #0b63c9;
	border-color: #0b63c9;
	color: #fff;
}

.icon-btn {
	width: 30px;
	height: 30px;
	padding: 0;
	display: inline-flex;
	align-items: center;
	justify-content: center;
}

.icon-btn svg {
	width: 16px;
	height: 16px;
	fill: currentColor;
	pointer-events: none;
}

.btn:disabled {
	opacity: .55;
	cursor: default;
}

.msg {
	border: 1px solid #d8d8d8;
	border-radius: 6px;
	padding: 8px 10px;
	margin: 0 0 10px 0;
	box-sizing: border-box;
	overflow: hidden;
}

.msg.user {
	background: #f7fbff;
	border-color: #c8ddf5;
}

.msg.assistant {
	background: #ffffff;
	border-color: #d8d8d8;
}

.msg.tool {
	background: #fbfbfb;
	border-color: #dddddd;
}

.msg.system {
	background: #fff9e8;
	border-color: #ecd9a1;
}

.role {
	font-size: 12px;
	font-weight: 700;
	color: #5a5a5a;
	margin-bottom: 6px;
}

.body {
	overflow-wrap: anywhere;
	word-break: break-word;
}

.body p,
.body ul,
.body pre,
.body h1,
.body h2,
.body h3,
.body h4,
.body h5,
.body h6 {
	margin: 0 0 8px 0;
}

.body h1,
.body h2,
.body h3,
.body h4,
.body h5,
.body h6 {
	line-height: 1.35;
}

.body h1 {
	font-size: 1.5em;
}

.body h2 {
	font-size: 1.17em;
}

.body h3 {
	font-size: 1em;
}

.body h4 {
	font-size: .83em;
}

.body h5,
.body h6 {
	font-size: .67em;
}

.body ul {
	padding-left: 20px;
}

.body code {
	font-family: Consolas, "Courier New", monospace;
	background: #f2f2f2;
	border-radius: 4px;
	padding: 1px 4px;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.body .code-block {
	position: relative;
	margin: 0 0 8px 0;
}

.body pre {
	overflow: auto;
	background: #f6f8fa;
	border-radius: 6px;
	padding: 10px;
	white-space: pre-wrap;
	word-break: break-word;
	overflow-wrap: anywhere;
}

.body pre code {
	background: transparent;
	padding: 0;
	border-radius: 0;
}

.body a {
	color: #0b63c9;
	text-decoration: none;
}

.body a:hover {
	text-decoration: underline;
}

.ai-config-callout .body p:last-child {
	margin-bottom: 0;
}

.inline-actions {
	display: flex;
	align-items: center;
	gap: 8px;
	margin-top: 10px;
}

.clear-confirm {
	display: flex;
	align-items: center;
	flex-wrap: wrap;
	gap: 8px;
	border: 1px solid #f0c6c1;
	background: #fff7f6;
	border-radius: 6px;
	padding: 7px 8px;
	box-sizing: border-box;
}

.clear-confirm[hidden] {
	display: none;
}

.clear-confirm-text {
	flex: 1 1 auto;
	min-width: 0;
	font-size: 12px;
	color: #374151;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.clear-confirm-actions {
	flex: 0 0 auto;
	display: flex;
	align-items: center;
	gap: 6px;
	margin-left: auto;
}

.btn.danger {
	background: #b42318;
	border-color: #b42318;
	color: #fff;
}

.muted {
	color: #6b7280;
}

.session-menu {
	position: absolute;
	left: 10px;
	bottom: 58px;
	width: 320px;
	max-height: 280px;
	overflow: auto;
	background: #fff;
	border: 1px solid #d6d6d6;
	border-radius: 8px;
	box-shadow: 0 10px 28px rgba(15, 23, 42, .14);
	padding: 6px;
	box-sizing: border-box;
	z-index: 10;
}

.session-menu[hidden] {
	display: none;
}

.session-item,
.session-empty {
	display: block;
	width: 100%;
	text-align: left;
	border: 0;
	background: transparent;
	border-radius: 6px;
	padding: 8px;
	box-sizing: border-box;
}

.session-item {
	cursor: pointer;
}

.session-item:hover {
	background: #f3f6fb;
}

.session-item-time {
	font-size: 11px;
	color: #6b7280;
	margin-bottom: 3px;
}

.session-item-title {
	font-size: 12px;
	color: #1f2937;
	line-height: 1.45;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
}

.session-empty {
	font-size: 12px;
	color: #6b7280;
}

.page-msgbox {
	position: absolute;
	left: 10px;
	right: 10px;
	bottom: 58px;
	max-width: 480px;
	margin: 0 auto;
	background: #fff;
	border: 1px solid #d6d6d6;
	border-radius: 8px;
	box-shadow: 0 12px 30px rgba(15, 23, 42, .18);
	padding: 10px;
	box-sizing: border-box;
	z-index: 12;
}

.page-msgbox[hidden] {
	display: none;
}

.page-msgbox-title {
	font-size: 13px;
	font-weight: 700;
	color: #1f2937;
	margin-bottom: 4px;
}

.page-msgbox-text {
	font-size: 12px;
	line-height: 1.45;
	color: #374151;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.page-msgbox-actions {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
	margin-top: 10px;
}
</style>
</head>
<body>
<div class="layout">
	<div id="history-scroll" class="history">
		<div id="chat-root"></div>
	</div>
	<div class="composer">
		<div class="input-wrap">
			<div class="mcp-guide">
				<a class="mcp-guide-link" href="https://github.com/aiqinxuancai/AutoLinker/blob/master/CONFIG.md#%E5%A4%96%E9%83%A8-agent-mcp-%E9%85%8D%E7%BD%AE">&#x63A8;&#x8350;&#x7528;Codex&#x8FDE;&#x63A5;MCP</a>
				<a class="mcp-guide-link" href="https://github.com/aiqinxuancai/Awesome-E-Agent">&#x5FC5;&#x8BFB;&#xFF1A;&#x6613;&#x8BED;&#x8A00; &#xD7; AI Agent &#x5B9E;&#x8DF5;&#x767D;&#x76AE;&#x4E66;</a>
			</div>
			<textarea id="chat-input" placeholder="&#x8F93;&#x5165;&#x6D88;&#x606F;&#xFF0C;Enter &#x53D1;&#x9001;&#xFF0C;Ctrl+Enter &#x6362;&#x884C;"></textarea>
			<div id="clear-confirm" class="clear-confirm" hidden>
				<div class="clear-confirm-text">&#x786E;&#x8BA4;&#x6E05;&#x7A7A;&#x5F53;&#x524D; AI &#x5BF9;&#x8BDD;&#xFF1F;&#x6E05;&#x7A7A;&#x540E;&#x5C06;&#x5F00;&#x542F;&#x65B0;&#x4F1A;&#x8BDD;&#x3002;</div>
				<div class="clear-confirm-actions">
					<button id="clear-confirm-btn" class="btn danger" type="button">&#x6E05;&#x7A7A;</button>
					<button id="clear-cancel-btn" class="btn" type="button">&#x53D6;&#x6D88;</button>
				</div>
			</div>
			<div class="actions">
				<div class="left-actions">
					<button id="clear-btn" class="btn icon-btn" type="button" title="&#x6E05;&#x7A7A;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;" aria-label="&#x6E05;&#x7A7A;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;">
						<svg viewBox="0 0 24 24" aria-hidden="true">
							<path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v8h-2V9zm4 0h2v8h-2V9zM7 9h2v8H7V9zm1 11h8c1.1 0 2-.9 2-2V8H6v10c0 1.1.9 2 2 2z"></path>
						</svg>
					</button>
					<button id="restore-btn" class="btn icon-btn" type="button" title="&#x6062;&#x590D;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;" aria-label="&#x6062;&#x590D;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;">
						<svg viewBox="0 0 24 24" aria-hidden="true">
							<path d="M12 5a7 7 0 1 1-6.57 9.42h2.13A5 5 0 1 0 7 12H3l3.2-3.2L9 11H7a5 5 0 1 0 5-5z"></path>
						</svg>
					</button>
					<button id="settings-btn" class="btn icon-btn" type="button" title="AI Key &#x8BBE;&#x7F6E;" aria-label="AI Key &#x8BBE;&#x7F6E;">
						<svg viewBox="0 0 24 24" aria-hidden="true">
							<path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.37-.31-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.69-.98L14.5 2.42A.49.49 0 0 0 14.01 2h-4c-.25 0-.46.18-.5.42L9.13 5.07c-.61.23-1.18.56-1.69.98l-2.49-1a.49.49 0 0 0-.6.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.08.65-.08.98s.03.66.08.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.12.22.37.31.6.22l2.49-1c.51.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.18-.58 1.69-.98l2.49 1c.23.08.48 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"></path>
						</svg>
					</button>
				</div>
				<div class="right-actions">
					<span id="context-usage" class="context-usage" title="&#x5F53;&#x524D;&#x4E0A;&#x4E0B;&#x6587;&#x4F7F;&#x7528;&#x7387;">&#x4E0A;&#x4E0B;&#x6587; --</span>
					<button id="send-btn" class="btn primary" type="button">&#x53D1;&#x9001;</button>
					<button id="stop-btn" class="btn" type="button" style="display:none;">&#x505C;&#x6B62;</button>
				</div>
			</div>
			<div id="session-menu" class="session-menu" hidden></div>
			<div id="restore-confirm" class="page-msgbox" role="alertdialog" aria-labelledby="restore-confirm-title" aria-describedby="restore-confirm-text" hidden>
				<div id="restore-confirm-title" class="page-msgbox-title">&#x6062;&#x590D;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;</div>
				<div id="restore-confirm-text" class="page-msgbox-text">&#x5F53;&#x524D;&#x5DF2;&#x6709;&#x5BF9;&#x8BDD;&#xFF0C;&#x6062;&#x590D;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;&#x5C06;&#x8986;&#x76D6;&#x5F53;&#x524D;&#x5185;&#x5BB9;&#xFF0C;&#x662F;&#x5426;&#x7EE7;&#x7EED;&#xFF1F;</div>
				<div class="page-msgbox-actions">
					<button id="restore-confirm-btn" class="btn danger" type="button">&#x8986;&#x76D6;&#x6062;&#x590D;</button>
					<button id="restore-cancel-btn" class="btn" type="button">&#x53D6;&#x6D88;</button>
				</div>
			</div>
		</div>
	</div>
</div>
<script>
window.autolinkerSetChatHtml = function(html) {
	var root = document.getElementById("chat-root");
	var scroll = document.getElementById("history-scroll");
	if (root) {
		root.innerHTML = html || "";
		if (scroll) {
			scroll.scrollTop = scroll.scrollHeight;
		}
	}
};

window.autolinkerSetBusy = function(busy, stopRequested) {
	var send = document.getElementById("send-btn");
	var stop = document.getElementById("stop-btn");
	var clear = document.getElementById("clear-btn");
	var restore = document.getElementById("restore-btn");
	var settings = document.getElementById("settings-btn");
	var clearConfirm = document.getElementById("clear-confirm");
	var restoreConfirm = document.getElementById("restore-confirm");
	var input = document.getElementById("chat-input");
	var isBusy = !!busy;
	var isStopping = !!stopRequested;
	if (send) {
		send.disabled = isBusy;
		send.style.display = isBusy ? "none" : "";
	}
	if (stop) {
		stop.disabled = !isBusy || isStopping;
		stop.textContent = isStopping ? "\u505C\u6B62\u4E2D..." : "\u505C\u6B62";
		stop.style.display = isBusy ? "" : "none";
	}
	if (clear) {
		clear.disabled = isBusy;
	}
	if (restore) {
		restore.disabled = isBusy;
	}
	if (settings) {
		settings.disabled = isBusy;
	}
	if (input) {
		input.disabled = isBusy;
	}
	if (isBusy) {
		var sessionMenu = document.getElementById("session-menu");
		if (sessionMenu) {
			sessionMenu.hidden = true;
		}
		if (clearConfirm) {
			clearConfirm.hidden = true;
		}
		if (restoreConfirm) {
			restoreConfirm.hidden = true;
		}
	}
};

window.autolinkerSetContextUsage = function(available, percent, label, title, estimated) {
	var el = document.getElementById("context-usage");
	if (!el) {
		return;
	}
	var value = Number(percent) || 0;
	el.textContent = label || "\u4E0A\u4E0B\u6587 --";
	el.title = title || "\u5F53\u524D\u4E0A\u4E0B\u6587\u4F7F\u7528\u7387";
	el.classList.toggle("warn", !!available && value >= 70 && value < 90);
	el.classList.toggle("danger", !!available && value >= 90);
	if (estimated) {
		el.setAttribute("data-estimated", "1");
	} else {
		el.removeAttribute("data-estimated");
	}
};

window.autolinkerClearInput = function() {
	var input = document.getElementById("chat-input");
	if (input) {
		input.value = "";
		input.focus();
	}
};

window.autolinkerFocusInput = function() {
	var input = document.getElementById("chat-input");
	if (input) {
		input.focus();
	}
};

(function() {
	var input = document.getElementById("chat-input");
	var send = document.getElementById("send-btn");
	var stop = document.getElementById("stop-btn");
	var clear = document.getElementById("clear-btn");
	var restore = document.getElementById("restore-btn");
	var settings = document.getElementById("settings-btn");
	var clearConfirm = document.getElementById("clear-confirm");
	var clearConfirmBtn = document.getElementById("clear-confirm-btn");
	var clearCancelBtn = document.getElementById("clear-cancel-btn");
	var restoreConfirm = document.getElementById("restore-confirm");
	var restoreConfirmBtn = document.getElementById("restore-confirm-btn");
	var restoreCancelBtn = document.getElementById("restore-cancel-btn");
	var sessionMenu = document.getElementById("session-menu");
	var recentSessions = [];

	function post(obj) {
		if (window.chrome && window.chrome.webview) {
			window.chrome.webview.postMessage(JSON.stringify(obj));
		}
	}

	function escapeHtml(text) {
		return String(text || "")
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;")
			.replace(/\"/g, "&quot;")
			.replace(/'/g, "&#39;");
	}

	function hideSessionMenu() {
		if (sessionMenu) {
			sessionMenu.hidden = true;
			sessionMenu.innerHTML = "";
		}
	}

	function hideClearConfirm() {
		if (clearConfirm) {
			clearConfirm.hidden = true;
		}
	}

	function hideRestoreConfirm() {
		if (restoreConfirm) {
			restoreConfirm.hidden = true;
		}
	}

	function showClearConfirm() {
		hideSessionMenu();
		hideRestoreConfirm();
		if (!clearConfirm) {
			return;
		}
		clearConfirm.hidden = false;
		if (clearConfirmBtn) {
			clearConfirmBtn.focus();
		}
	}

	function showRestoreConfirm() {
		hideSessionMenu();
		hideClearConfirm();
		if (!restoreConfirm) {
			return;
		}
		restoreConfirm.hidden = false;
		if (restoreConfirmBtn) {
			restoreConfirmBtn.focus();
		}
	}

	function renderSessionMenu() {
		if (!sessionMenu) {
			return;
		}
		if (!recentSessions || !recentSessions.length) {
			sessionMenu.innerHTML = '<div class="session-empty">&#x6682;&#x65E0;&#x6700;&#x8FD1;&#x4F1A;&#x8BDD;</div>';
			return;
		}
		var html = "";
		for (var i = 0; i < recentSessions.length; i++) {
			var item = recentSessions[i] || {};
			html += '<button class="session-item" type="button" data-session-id="' + escapeHtml(item.sessionId || "") + '">';
			html += '<div class="session-item-time">' + escapeHtml(item.updatedAt || "") + '</div>';
			html += '<div class="session-item-title">' + escapeHtml(item.title || "") + '</div>';
			html += '</button>';
		}
		sessionMenu.innerHTML = html;
	}

	window.autolinkerHideSessionMenu = hideSessionMenu;
	window.autolinkerHideClearConfirm = hideClearConfirm;
	window.autolinkerHideRestoreConfirm = hideRestoreConfirm;
	window.autolinkerShowClearConfirm = showClearConfirm;
	window.autolinkerShowRestoreConfirm = showRestoreConfirm;
	window.autolinkerShowSessionMenu = function(items) {
		hideClearConfirm();
		hideRestoreConfirm();
		recentSessions = Array.isArray(items) ? items : [];
		renderSessionMenu();
		if (sessionMenu) {
			sessionMenu.hidden = false;
		}
	};

	function doSend() {
		if (!input || input.disabled) {
			return;
		}
		hideClearConfirm();
		hideRestoreConfirm();
		post({ action: "submit", text: input.value || "" });
	}

	function doStop() {
		post({ action: "stop" });
	}

	if (send) {
		send.addEventListener("click", doSend);
	}
	if (stop) {
		stop.addEventListener("click", doStop);
	}
	if (clear) {
		clear.addEventListener("click", function() {
			hideSessionMenu();
			hideRestoreConfirm();
			post({ action: "clear" });
		});
	}
	if (clearConfirmBtn) {
		clearConfirmBtn.addEventListener("click", function() {
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "clear_confirmed" });
		});
	}
	if (clearCancelBtn) {
		clearCancelBtn.addEventListener("click", function() {
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "clear_cancel" });
			if (input) {
				input.focus();
			}
		});
	}
	if (restoreConfirmBtn) {
		restoreConfirmBtn.addEventListener("click", function() {
			hideRestoreConfirm();
			post({ action: "restore_confirmed" });
		});
	}
	if (restoreCancelBtn) {
		restoreCancelBtn.addEventListener("click", function() {
			hideRestoreConfirm();
			post({ action: "restore_cancel" });
			if (input) {
				input.focus();
			}
		});
	}
	if (restore) {
		restore.addEventListener("click", function() {
			hideClearConfirm();
			hideRestoreConfirm();
			if (sessionMenu && !sessionMenu.hidden) {
				hideSessionMenu();
				return;
			}
			post({ action: "show_sessions" });
		});
	}
	if (settings) {
		settings.addEventListener("click", function() {
			hideSessionMenu();
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "open_settings" });
		});
	}

	document.addEventListener("click", function(e) {
		var sessionBtn = e.target && e.target.closest ? e.target.closest(".session-item") : null;
		if (sessionBtn) {
			e.preventDefault();
			hideSessionMenu();
			post({ action: "restore_session", sessionId: sessionBtn.getAttribute("data-session-id") || "" });
			return;
		}
		var mcpGuideLink = e.target && e.target.closest ? e.target.closest(".mcp-guide-link") : null;
		if (mcpGuideLink) {
			e.preventDefault();
			post({ action: "open_url", url: mcpGuideLink.getAttribute("href") || "" });
			return;
		}
		var actionBtn = e.target && e.target.closest ? e.target.closest("[data-chat-action='open_settings']") : null;
		if (actionBtn) {
			e.preventDefault();
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "open_settings" });
			return;
		}
	});

	document.addEventListener("mousedown", function(e) {
		if (!sessionMenu || sessionMenu.hidden) {
			return;
		}
		var insideMenu = sessionMenu.contains(e.target);
		var onRestoreBtn = restore && restore.contains && restore.contains(e.target);
		if (!insideMenu && !onRestoreBtn) {
			hideSessionMenu();
		}
	});

	document.addEventListener("keydown", function(e) {
		if (e.key === "Escape") {
			if (restoreConfirm && !restoreConfirm.hidden) {
				hideRestoreConfirm();
				post({ action: "restore_cancel" });
				return;
			}
			hideClearConfirm();
		}
	});

	if (input) {
		input.addEventListener("keydown", function(e) {
			if (e.key === "Enter" && !e.ctrlKey) {
				e.preventDefault();
				doSend();
			}
		});
		setTimeout(function() {
			input.focus();
		}, 0);
	}
})();
</script>
</body>
</html>
