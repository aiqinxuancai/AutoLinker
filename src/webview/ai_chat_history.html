<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
	margin: 0;
	padding: 0;
	background: #ffffff;
	color: #222;
	font: 13px/1.6 "Microsoft YaHei UI", "Segoe UI", sans-serif;
}

body {
	padding: 0;
}

.layout {
	display: flex;
	flex-direction: column;
	height: 100vh;
	box-sizing: border-box;
}

.history {
	flex: 1 1 auto;
	overflow: auto;
	padding: 10px 10px 8px 10px;
	box-sizing: border-box;
}

#chat-root {
	min-height: 100%;
}

.composer {
	flex: 0 0 auto;
	border-top: 1px solid #d9d9d9;
	background: #fbfbfb;
	padding: 8px 10px 10px 10px;
	box-sizing: border-box;
}

.actions {
	display: flex;
	justify-content: space-between;
	align-items: flex-end;
	gap: 8px;
}

.left-actions,
.right-actions {
	display: flex;
	align-items: center;
	gap: 8px;
}

.right-actions {
	margin-left: auto;
}

.input-wrap {
	display: flex;
	flex-direction: column;
	gap: 8px;
}

#chat-input {
	width: 100%;
	min-height: 58px;
	max-height: 160px;
	resize: vertical;
	box-sizing: border-box;
	border: 1px solid #cfcfcf;
	border-radius: 6px;
	padding: 8px 10px;
	font: 13px/1.5 "Microsoft YaHei UI", "Segoe UI", sans-serif;
	outline: none;
	background: #fff;
}

#chat-input:focus {
	border-color: #7aa7e0;
	box-shadow: 0 0 0 2px rgba(64, 127, 214, .12);
}

.btn {
	border: 1px solid #c8c8c8;
	background: #fff;
	border-radius: 6px;
	padding: 6px 12px;
	font: 12px "Microsoft YaHei UI", "Segoe UI", sans-serif;
	cursor: pointer;
}

.btn.primary {
	background: #0b63c9;
	border-color: #0b63c9;
	color: #fff;
}

.btn:disabled {
	opacity: .55;
	cursor: default;
}

.msg {
	border: 1px solid #d8d8d8;
	border-radius: 6px;
	padding: 8px 10px;
	margin: 0 0 10px 0;
	box-sizing: border-box;
	overflow: hidden;
}

.msg.user {
	background: #f7fbff;
	border-color: #c8ddf5;
}

.msg.assistant {
	background: #ffffff;
	border-color: #d8d8d8;
}

.msg.tool {
	background: #fbfbfb;
	border-color: #dddddd;
}

.msg.system {
	background: #fff9e8;
	border-color: #ecd9a1;
}

.role {
	font-size: 12px;
	font-weight: 700;
	color: #5a5a5a;
	margin-bottom: 6px;
}

.body {
	overflow-wrap: anywhere;
	word-break: break-word;
}

.body p,
.body ul,
.body pre,
.body h1,
.body h2,
.body h3,
.body h4,
.body h5,
.body h6 {
	margin: 0 0 8px 0;
}

.body ul {
	padding-left: 20px;
}

.body code {
	font-family: Consolas, "Courier New", monospace;
	background: #f2f2f2;
	border-radius: 4px;
	padding: 1px 4px;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.body .code-block {
	position: relative;
	margin: 0 0 8px 0;
}

.body .code-copy-btn {
	position: absolute;
	top: 8px;
	right: 8px;
	z-index: 1;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	width: 28px;
	height: 28px;
	border: 1px solid #d0d7de;
	background: #ffffff;
	color: #57606a;
	border-radius: 6px;
	padding: 0;
	cursor: pointer;
	box-shadow: 0 1px 2px rgba(31, 35, 40, .06);
}

.body .code-copy-btn:hover {
	background: #f3f4f6;
	color: #24292f;
}

.body .code-copy-btn:active {
	background: #e9ebef;
}

.body .code-copy-btn svg {
	width: 15px;
	height: 15px;
	fill: currentColor;
	pointer-events: none;
}

.body .code-copy-btn.copied {
	background: #e7f6ec;
	border-color: #9dd3ae;
	color: #146c2e;
}

.body .code-copy-btn.failed {
	background: #fff1f0;
	border-color: #ffb3ad;
	color: #c62828;
}

.body pre {
	overflow: auto;
	background: #f6f8fa;
	border-radius: 6px;
	padding: 42px 10px 10px 10px;
	white-space: pre-wrap;
	word-break: break-word;
	overflow-wrap: anywhere;
}

.body pre code {
	background: transparent;
	padding: 0;
	border-radius: 0;
}

.body a {
	color: #0b63c9;
	text-decoration: none;
}

.body a:hover {
	text-decoration: underline;
}

.ai-config-callout .body p:last-child {
	margin-bottom: 0;
}

.inline-actions {
	display: flex;
	align-items: center;
	gap: 8px;
	margin-top: 10px;
}

.muted {
	color: #6b7280;
}
</style>
</head>
<body>
<div class="layout">
	<div id="history-scroll" class="history">
		<div id="chat-root"></div>
	</div>
	<div class="composer">
		<div class="input-wrap">
			<textarea id="chat-input" placeholder="&#x8F93;&#x5165;&#x6D88;&#x606F;&#xFF0C;Enter &#x53D1;&#x9001;&#xFF0C;Ctrl+Enter &#x6362;&#x884C;"></textarea>
			<div class="actions">
				<div class="left-actions">
					<button id="clear-btn" class="btn" type="button">&#x6E05;&#x7A7A;&#x5386;&#x53F2;&#x4F1A;&#x8BDD;</button>
				</div>
				<div class="right-actions">
					<button id="send-btn" class="btn primary" type="button">&#x53D1;&#x9001;</button>
					<button id="stop-btn" class="btn" type="button" style="display:none;">&#x505C;&#x6B62;</button>
				</div>
			</div>
		</div>
	</div>
</div>
<script>
window.autolinkerSetChatHtml = function(html) {
	var root = document.getElementById("chat-root");
	var scroll = document.getElementById("history-scroll");
	if (root) {
		root.innerHTML = html || "";
		if (scroll) {
			scroll.scrollTop = scroll.scrollHeight;
		}
	}
};

window.autolinkerSetBusy = function(busy, stopRequested) {
	var send = document.getElementById("send-btn");
	var stop = document.getElementById("stop-btn");
	var clear = document.getElementById("clear-btn");
	var input = document.getElementById("chat-input");
	var isBusy = !!busy;
	var isStopping = !!stopRequested;
	if (send) {
		send.disabled = isBusy;
		send.style.display = isBusy ? "none" : "";
	}
	if (stop) {
		stop.disabled = !isBusy || isStopping;
		stop.textContent = isStopping ? "\u505C\u6B62\u4E2D..." : "\u505C\u6B62";
		stop.style.display = isBusy ? "" : "none";
	}
	if (clear) {
		clear.disabled = isBusy;
	}
	if (input) {
		input.disabled = isBusy;
	}
};

window.autolinkerClearInput = function() {
	var input = document.getElementById("chat-input");
	if (input) {
		input.value = "";
		input.focus();
	}
};

window.autolinkerFocusInput = function() {
	var input = document.getElementById("chat-input");
	if (input) {
		input.focus();
	}
};

(function() {
	var input = document.getElementById("chat-input");
	var send = document.getElementById("send-btn");
	var stop = document.getElementById("stop-btn");
	var clear = document.getElementById("clear-btn");

	function post(obj) {
		if (window.chrome && window.chrome.webview) {
			window.chrome.webview.postMessage(JSON.stringify(obj));
		}
	}

	function setCopyState(btn, state) {
		if (!btn) {
			return;
		}
		var copied = state === "copied";
		var failed = state === "failed";
		btn.classList.toggle("copied", copied);
		btn.classList.toggle("failed", failed);

		var title = "\u590D\u5236\u4EE3\u7801";
		if (copied) {
			title = "\u5DF2\u590D\u5236";
		} else if (failed) {
			title = "\u590D\u5236\u5931\u8D25";
		}

		btn.setAttribute("title", title);
		btn.setAttribute("aria-label", title);
		if (btn._copyTimer) {
			clearTimeout(btn._copyTimer);
		}
		if (state !== "idle") {
			btn._copyTimer = setTimeout(function() {
				btn.classList.remove("copied");
				btn.classList.remove("failed");
				btn.setAttribute("title", "\u590D\u5236\u4EE3\u7801");
				btn.setAttribute("aria-label", "\u590D\u5236\u4EE3\u7801");
				btn._copyTimer = 0;
			}, 1600);
		}
	}

	function copyCode(btn) {
		if (!btn) {
			return;
		}
		var block = btn.closest(".code-block");
		var code = block ? block.querySelector("code") : null;
		var text = code ? (code.textContent || "") : "";
		if (!text) {
			setCopyState(btn, "failed");
			return;
		}
		if (window.chrome && window.chrome.webview) {
			post({ action: "copy_code", text: text });
			setCopyState(btn, "copied");
			return;
		}
		if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(text).then(function() {
				setCopyState(btn, "copied");
			}, function() {
				setCopyState(btn, "failed");
			});
			return;
		}
		setCopyState(btn, "failed");
	}

	function doSend() {
		if (!input || input.disabled) {
			return;
		}
		post({ action: "submit", text: input.value || "" });
	}

	function doStop() {
		post({ action: "stop" });
	}

	if (send) {
		send.addEventListener("click", doSend);
	}
	if (stop) {
		stop.addEventListener("click", doStop);
	}
	if (clear) {
		clear.addEventListener("click", function() {
			post({ action: "clear" });
		});
	}

	document.addEventListener("click", function(e) {
		var actionBtn = e.target && e.target.closest ? e.target.closest("[data-chat-action='open_settings']") : null;
		if (actionBtn) {
			e.preventDefault();
			post({ action: "open_settings" });
			return;
		}
		var btn = e.target && e.target.closest ? e.target.closest(".code-copy-btn") : null;
		if (!btn) {
			return;
		}
		e.preventDefault();
		copyCode(btn);
	});

	if (input) {
		input.addEventListener("keydown", function(e) {
			if (e.key === "Enter" && !e.ctrlKey) {
				e.preventDefault();
				doSend();
			}
		});
		setTimeout(function() {
			input.focus();
		}, 0);
	}
})();
</script>
</body>
</html>
