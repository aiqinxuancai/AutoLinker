<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
	margin: 0;
	padding: 0;
	background: #e6e9ef;
	color: #4c4f69;
	font: 13px/1.6 "Microsoft YaHei UI", "Segoe UI", sans-serif;
}

body {
	padding: 0;
}

.layout {
	display: flex;
	flex-direction: column;
	height: 100vh;
	box-sizing: border-box;
	position: relative;
}

.topbar {
	flex: 0 0 36px;
	height: 36px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	background: #e6e9ef;
	padding: 0 10px 0 12px;
	box-sizing: border-box;
	position: relative;
}

.topbar-brand {
	color: #8839ef;
	font-size: 13px;
	font-weight: 300;
	line-height: 1;
	letter-spacing: 0;
	text-transform: uppercase;
	white-space: nowrap;
}

.topbar-actions {
	display: flex;
	align-items: center;
	gap: 8px;
}

.top-action {
	width: 24px;
	height: 24px;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	border: 0;
	border-radius: 0;
	background: transparent;
	color: #4c4f69;
	padding: 0;
	cursor: pointer;
}

.top-action:hover {
	color: #0b63c9;
}

.top-action:focus-visible {
	outline: 1px solid #4c4f69;
	outline-offset: 2px;
}

.top-action:disabled {
	opacity: .45;
	cursor: default;
}

.top-action svg {
	width: 14px;
	height: 14px;
	fill: none;
	stroke: currentColor;
	stroke-width: 1.25;
	stroke-linecap: round;
	stroke-linejoin: round;
	pointer-events: none;
}

.history {
	flex: 1 1 auto;
	min-height: 0;
	overflow: auto;
	padding: 0;
	box-sizing: border-box;
	background: #e6e9ef;
	font-size: 12px;
	color: #4c4f69;
}

#chat-root {
	min-height: 100%;
	background: #e6e9ef;
	display: flex;
	flex-direction: column;
}

.composer {
	flex: 0 0 auto;
	border-top: 1px solid #d7dbe3;
	background: #e6e9ef;
	padding: 12px 12px 14px 12px;
	box-sizing: border-box;
	position: relative;
}

.actions {
	display: flex;
	justify-content: space-between;
	align-items: flex-end;
	gap: 8px;
}

.left-actions,
.right-actions {
	display: flex;
	align-items: center;
	gap: 8px;
}

.right-actions {
	margin-left: auto;
}

.context-usage {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-width: 0;
	height: 20px;
	border: 0;
	border-radius: 0;
	background: transparent;
	color: #4c4f69;
	font: 11px/1 "Microsoft YaHei UI", "Segoe UI", sans-serif;
	white-space: nowrap;
	padding: 0;
	box-sizing: border-box;
}

.context-usage.warn {
	color: #8a5a00;
	background: transparent;
}

.context-usage.danger {
	color: #9f1f17;
	background: transparent;
}

.input-wrap {
	display: flex;
	flex-direction: column;
	gap: 8px;
}

.empty-state {
	flex: 1 1 auto;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	gap: 24px;
	padding: 28px 20px;
	box-sizing: border-box;
	text-align: center;
}

.empty-state-title {
	font-size: 34px;
	font-weight: 800;
	letter-spacing: 3px;
	line-height: 1.25;
	background: linear-gradient(110deg, #8839ef 0%, #1e66f5 42%, #04a5e5 78%, #8839ef 100%);
	background-size: 220% auto;
	-webkit-background-clip: text;
	background-clip: text;
	-webkit-text-fill-color: transparent;
	color: transparent;
	filter: drop-shadow(0 2px 12px rgba(136, 57, 239, .26));
	animation: empty-state-flow 7s ease-in-out infinite;
	user-select: none;
}

@keyframes empty-state-flow {
	0% { background-position: 0% center; }
	50% { background-position: 100% center; }
	100% { background-position: 0% center; }
}

.empty-state-links {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 10px;
}

.empty-state-links a {
	display: inline-block;
	font-size: 13px;
	line-height: 1.2;
	color: #1e66f5;
	text-decoration: none;
	padding: 8px 18px;
	border: 1px solid rgba(30, 102, 245, .26);
	border-radius: 6px;
	background: rgba(30, 102, 245, .06);
	transition: color .15s ease, background-color .15s ease, border-color .15s ease, box-shadow .15s ease;
	cursor: pointer;
}

.empty-state-links a:hover {
	color: #fff;
	background: #1e66f5;
	border-color: #1e66f5;
	box-shadow: 0 6px 16px rgba(30, 102, 245, .26);
}

.input-area {
	position: relative;
	margin-top: 2px;
}

#chat-input {
	width: 100%;
	min-height: 60px;
	max-height: 220px;
	resize: none;
	box-sizing: border-box;
	border: 1px solid #d4d9e3;
	border-radius: 6px;
	padding: 11px 44px 32px 12px;
	font: 13px/1.5 "Microsoft YaHei UI", "Segoe UI", sans-serif;
	color: #4c4f69;
	outline: none;
	background: #fff;
	overflow: hidden;
	box-shadow: 0 1px 2px rgba(76, 79, 105, .05);
	transition: border-color .15s ease, box-shadow .15s ease;
}

#chat-input::placeholder {
	color: #9ca3b4;
}

#chat-input:focus {
	border-color: #1e66f5;
	box-shadow: 0 0 0 3px rgba(30, 102, 245, .12), 0 1px 3px rgba(30, 102, 245, .08);
}

.btn {
	border: 1px solid #d2d7e0;
	background: #fff;
	border-radius: 6px;
	padding: 6px 14px;
	font: 12px "Microsoft YaHei UI", "Segoe UI", sans-serif;
	color: #4c4f69;
	cursor: pointer;
	transition: background-color .15s ease, border-color .15s ease, box-shadow .15s ease;
}

.btn:hover {
	background: #eef1f6;
	border-color: #c2c8d4;
}

.btn.primary {
	background: #1e66f5;
	border-color: #1e66f5;
	color: #fff;
}

.btn.primary:hover {
	background: #1554d1;
	border-color: #1554d1;
}

.send-icon-btn {
	position: absolute;
	right: 8px;
	bottom: 8px;
	width: 28px;
	height: 28px;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	border: 0;
	border-radius: 6px;
	background: transparent;
	color: #1e66f5;
	padding: 0;
	cursor: pointer;
	transition: color .15s ease, transform .1s ease;
}

.send-icon-btn:hover {
	color: #1554d1;
}

.send-icon-btn:active {
	transform: scale(.9);
}

.send-icon-btn:focus-visible {
	outline: 2px solid rgba(30, 102, 245, .4);
	outline-offset: 2px;
}

.send-icon-btn:disabled {
	color: #b9bfca;
	cursor: default;
}

.send-icon-btn svg {
	width: 17px;
	height: 17px;
	fill: none;
	stroke: currentColor;
	stroke-width: 1.6;
	stroke-linecap: round;
	stroke-linejoin: round;
	pointer-events: none;
}

.icon-btn {
	width: 30px;
	height: 30px;
	padding: 0;
	display: inline-flex;
	align-items: center;
	justify-content: center;
}

.icon-btn svg {
	width: 16px;
	height: 16px;
	fill: currentColor;
	pointer-events: none;
}

.btn:disabled {
	opacity: .55;
	cursor: default;
}

.msg {
	border: 0;
	border-bottom: 1pt solid #e6e9ef;
	border-radius: 0;
	padding: 10px 12px;
	margin: 0;
	box-sizing: border-box;
	overflow: hidden;
	color: #4c4f69;
}

.msg.user {
	background: #eff1f5;
}

.msg.assistant {
	background: #e6e9ef;
}

.msg.tool {
	background: #e6e9ef;
}

.msg.system {
	background: #e6e9ef;
}

.role {
	font-size: 12px;
	font-weight: 700;
	color: #4c4f69;
	margin-bottom: 6px;
}

.body {
	overflow-wrap: anywhere;
	word-break: break-word;
	color: #4c4f69;
}

.body p,
.body ul,
.body pre,
.body h1,
.body h2,
.body h3,
.body h4,
.body h5,
.body h6 {
	margin: 0 0 8px 0;
}

.body > :last-child {
	margin-bottom: 0;
}

.body h1,
.body h2,
.body h3,
.body h4,
.body h5,
.body h6 {
	line-height: 1.35;
}

.body h1 {
	font-size: 1.5em;
}

.body h2 {
	font-size: 1.17em;
}

.body h3 {
	font-size: 1em;
}

.body h4 {
	font-size: .83em;
}

.body h5,
.body h6 {
	font-size: .67em;
}

.body ul {
	padding-left: 20px;
}

.body code {
	font-family: Consolas, "Courier New", monospace;
	background: #cfd1d7;
	border-radius: 4px;
	padding: 1px 4px;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.body .code-block {
	position: relative;
	margin: 0 0 8px 0;
}

.body pre {
	overflow: auto;
	background: #ccd0da;
	border-radius: 6px;
	padding: 10px;
	white-space: pre-wrap;
	word-break: break-word;
	overflow-wrap: anywhere;
}

.body pre code {
	background: transparent;
	padding: 0;
	border-radius: 0;
}

.body a {
	color: #0b63c9;
	text-decoration: none;
}

.body a:hover {
	text-decoration: underline;
}

.ai-config-callout .body p:last-child {
	margin-bottom: 0;
}

.inline-actions {
	display: flex;
	align-items: center;
	gap: 8px;
	margin-top: 10px;
}

.clear-confirm {
	display: flex;
	align-items: center;
	flex-wrap: wrap;
	gap: 8px;
	border: 1px solid #f0c6c1;
	background: #fff7f6;
	border-radius: 6px;
	padding: 7px 8px;
	box-sizing: border-box;
}

.clear-confirm[hidden] {
	display: none;
}

.clear-confirm-text {
	flex: 1 1 auto;
	min-width: 0;
	font-size: 12px;
	color: #374151;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.clear-confirm-actions {
	flex: 0 0 auto;
	display: flex;
	align-items: center;
	gap: 6px;
	margin-left: auto;
}

.btn.danger {
	background: #b42318;
	border-color: #b42318;
	color: #fff;
}

.btn.danger:hover {
	background: #9a1d14;
	border-color: #9a1d14;
}

.muted {
	color: #6b7280;
}

.session-menu {
	position: absolute;
	top: 34px;
	right: 8px;
	width: 320px;
	max-height: 280px;
	overflow: auto;
	background: #fff;
	border: 1px solid #d6d6d6;
	border-radius: 8px;
	box-shadow: 0 10px 28px rgba(15, 23, 42, .14);
	padding: 6px;
	box-sizing: border-box;
	z-index: 10;
}

.session-menu[hidden] {
	display: none;
}

.session-item,
.session-empty {
	display: block;
	width: 100%;
	text-align: left;
	border: 0;
	background: transparent;
	border-radius: 6px;
	padding: 8px;
	box-sizing: border-box;
}

.session-item {
	cursor: pointer;
}

.session-item:hover {
	background: #f3f6fb;
}

.session-item-time {
	font-size: 11px;
	color: #6b7280;
	margin-bottom: 3px;
}

.session-item-title {
	font-size: 12px;
	color: #1f2937;
	line-height: 1.45;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
}

.session-empty {
	font-size: 12px;
	color: #6b7280;
}

.page-msgbox {
	position: absolute;
	left: 10px;
	right: 10px;
	bottom: 58px;
	max-width: 480px;
	margin: 0 auto;
	background: #fff;
	border: 1px solid #d6d6d6;
	border-radius: 8px;
	box-shadow: 0 12px 30px rgba(15, 23, 42, .18);
	padding: 10px;
	box-sizing: border-box;
	z-index: 12;
}

.page-msgbox[hidden] {
	display: none;
}

.page-msgbox-title {
	font-size: 13px;
	font-weight: 700;
	color: #1f2937;
	margin-bottom: 4px;
}

.page-msgbox-text {
	font-size: 12px;
	line-height: 1.45;
	color: #374151;
	overflow-wrap: anywhere;
	word-break: break-word;
}

.page-msgbox-actions {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
	margin-top: 10px;
}
</style>
</head>
<body>

	<div class="topbar">
		<div class="topbar-brand">AUTOLINKER</div>

			<button id="new-session-btn" class="top-action" type="button" title="&#x65B0;&#x5EFA;&#x4F1A;&#x8BDD;" aria-label="&#x65B0;&#x5EFA;&#x4F1A;&#x8BDD;">

<script>
window.autolinkerSetChatHtml = function(html) {
	var root = document.getElementById("chat-root");
	var scroll = document.getElementById("history-scroll");
	if (root) {
		root.innerHTML = html || "";
		if (scroll) {
			scroll.scrollTop = scroll.scrollHeight;
		}
	}
};

window.autolinkerSetBusy = function(busy, stopRequested) {
	var send = document.getElementById("send-btn");
	var stop = document.getElementById("stop-btn");
	var newSession = document.getElementById("new-session-btn");
	var restore = document.getElementById("restore-btn");
	var settings = document.getElementById("settings-btn");
	var clearConfirm = document.getElementById("clear-confirm");
	var restoreConfirm = document.getElementById("restore-confirm");
	var input = document.getElementById("chat-input");
	var isBusy = !!busy;
	var isStopping = !!stopRequested;
	if (send) {
		send.disabled = isBusy;
		send.style.display = isBusy ? "none" : "";
	}
	if (stop) {
		stop.disabled = !isBusy || isStopping;
		stop.textContent = isStopping ? "\u505C\u6B62\u4E2D..." : "\u505C\u6B62";
		stop.style.display = isBusy ? "" : "none";
	}
	if (newSession) {
		newSession.disabled = isBusy;
	}
	if (restore) {
		restore.disabled = isBusy;
	}
	if (settings) {
		settings.disabled = isBusy;
	}
	if (input) {
		input.disabled = isBusy;
	}
	if (isBusy) {
		var sessionMenu = document.getElementById("session-menu");
		if (sessionMenu) {
			sessionMenu.hidden = true;
		}
		if (clearConfirm) {
			clearConfirm.hidden = true;
		}
		if (restoreConfirm) {
			restoreConfirm.hidden = true;
		}
	}
};

window.autolinkerSetContextUsage = function(available, percent, label, title, estimated) {
	var el = document.getElementById("context-usage");
	if (!el) {
		return;
	}
	var value = Number(percent) || 0;
	el.textContent = label || "\u4E0A\u4E0B\u6587 --";
	el.title = title || "\u5F53\u524D\u4E0A\u4E0B\u6587\u4F7F\u7528\u7387";
	el.classList.toggle("warn", !!available && value >= 70 && value < 90);
	el.classList.toggle("danger", !!available && value >= 90);
	if (estimated) {
		el.setAttribute("data-estimated", "1");
	} else {
		el.removeAttribute("data-estimated");
	}
};

window.autolinkerResizeChatInput = function(input) {
	if (!input) {
		return;
	}
	var maxHeight = 220;
	var minHeight = 60;
	input.style.height = "auto";
	var nextHeight = Math.max(minHeight, Math.min(input.scrollHeight, maxHeight));
	input.style.height = nextHeight + "px";
	input.style.overflowY = input.scrollHeight > maxHeight ? "auto" : "hidden";
};

window.autolinkerClearInput = function() {
	var input = document.getElementById("chat-input");
	if (input) {
		input.value = "";
		window.autolinkerResizeChatInput(input);
		input.focus();
	}
};

window.autolinkerFocusInput = function() {
	var input = document.getElementById("chat-input");
	if (input) {
		window.autolinkerResizeChatInput(input);
		input.focus();
	}
};

(function() {
	var input = document.getElementById("chat-input");
	var send = document.getElementById("send-btn");
	var stop = document.getElementById("stop-btn");
	var newSession = document.getElementById("new-session-btn");
	var restore = document.getElementById("restore-btn");
	var settings = document.getElementById("settings-btn");
	var clearConfirm = document.getElementById("clear-confirm");
	var clearConfirmBtn = document.getElementById("clear-confirm-btn");
	var clearCancelBtn = document.getElementById("clear-cancel-btn");
	var restoreConfirm = document.getElementById("restore-confirm");
	var restoreConfirmBtn = document.getElementById("restore-confirm-btn");
	var restoreCancelBtn = document.getElementById("restore-cancel-btn");
	var sessionMenu = document.getElementById("session-menu");
	var recentSessions = [];

	function post(obj) {
		if (window.chrome && window.chrome.webview) {
			window.chrome.webview.postMessage(JSON.stringify(obj));
		}
	}

	function escapeHtml(text) {
		return String(text || "")
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;")
			.replace(/\"/g, "&quot;")
			.replace(/'/g, "&#39;");
	}

	function hideSessionMenu() {
		if (sessionMenu) {
			sessionMenu.hidden = true;
			sessionMenu.innerHTML = "";
		}
	}

	function hideClearConfirm() {
		if (clearConfirm) {
			clearConfirm.hidden = true;
		}
	}

	function hideRestoreConfirm() {
		if (restoreConfirm) {
			restoreConfirm.hidden = true;
		}
	}

	function showClearConfirm() {
		hideSessionMenu();
		hideRestoreConfirm();
		if (!clearConfirm) {
			return;
		}
		clearConfirm.hidden = false;
		if (clearConfirmBtn) {
			clearConfirmBtn.focus();
		}
	}

	function showRestoreConfirm() {
		hideSessionMenu();
		hideClearConfirm();
		if (!restoreConfirm) {
			return;
		}
		restoreConfirm.hidden = false;
		if (restoreConfirmBtn) {
			restoreConfirmBtn.focus();
		}
	}

	function renderSessionMenu() {
		if (!sessionMenu) {
			return;
		}
		if (!recentSessions || !recentSessions.length) {
			sessionMenu.innerHTML = '<div class="session-empty">&#x6682;&#x65E0;&#x6700;&#x8FD1;&#x4F1A;&#x8BDD;</div>';
			return;
		}
		var html = "";
		for (var i = 0; i < recentSessions.length; i++) {
			var item = recentSessions[i] || {};
			html += '<button class="session-item" type="button" data-session-id="' + escapeHtml(item.sessionId || "") + '">';
			html += '<div class="session-item-time">' + escapeHtml(item.updatedAt || "") + '</div>';
			html += '<div class="session-item-title">' + escapeHtml(item.title || "") + '</div>';
			html += '</button>';
		}
		sessionMenu.innerHTML = html;
	}

	window.autolinkerHideSessionMenu = hideSessionMenu;
	window.autolinkerHideClearConfirm = hideClearConfirm;
	window.autolinkerHideRestoreConfirm = hideRestoreConfirm;
	window.autolinkerShowClearConfirm = showClearConfirm;
	window.autolinkerShowRestoreConfirm = showRestoreConfirm;
	window.autolinkerShowSessionMenu = function(items) {
		hideClearConfirm();
		hideRestoreConfirm();
		recentSessions = Array.isArray(items) ? items : [];
		renderSessionMenu();
		if (sessionMenu) {
			sessionMenu.hidden = false;
		}
	};

	function doSend() {
		if (!input || input.disabled) {
			return;
		}
		hideClearConfirm();
		hideRestoreConfirm();
		post({ action: "submit", text: input.value || "" });
	}

	function doStop() {
		post({ action: "stop" });
	}

	if (send) {
		send.addEventListener("click", doSend);
	}
	if (stop) {
		stop.addEventListener("click", doStop);
	}
	if (newSession) {
		newSession.addEventListener("click", function() {
			hideSessionMenu();
			hideRestoreConfirm();
			hideClearConfirm();
			post({ action: "new_session" });
		});
	}
	if (clearConfirmBtn) {
		clearConfirmBtn.addEventListener("click", function() {
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "clear_confirmed" });
		});
	}
	if (clearCancelBtn) {
		clearCancelBtn.addEventListener("click", function() {
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "clear_cancel" });
			if (input) {
				input.focus();
			}
		});
	}
	if (restoreConfirmBtn) {
		restoreConfirmBtn.addEventListener("click", function() {
			hideRestoreConfirm();
			post({ action: "restore_confirmed" });
		});
	}
	if (restoreCancelBtn) {
		restoreCancelBtn.addEventListener("click", function() {
			hideRestoreConfirm();
			post({ action: "restore_cancel" });
			if (input) {
				input.focus();
			}
		});
	}
	if (restore) {
		restore.addEventListener("click", function() {
			hideClearConfirm();
			hideRestoreConfirm();
			if (sessionMenu && !sessionMenu.hidden) {
				hideSessionMenu();
				return;
			}
			post({ action: "show_sessions" });
		});
	}
	if (settings) {
		settings.addEventListener("click", function() {
			hideSessionMenu();
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "open_settings" });
		});
	}

	document.addEventListener("click", function(e) {
		var sessionBtn = e.target && e.target.closest ? e.target.closest(".session-item") : null;
		if (sessionBtn) {
			e.preventDefault();
			hideSessionMenu();
			post({ action: "restore_session", sessionId: sessionBtn.getAttribute("data-session-id") || "" });
			return;
		}
		var mcpGuideLink = e.target && e.target.closest ? e.target.closest(".mcp-guide-link") : null;
		if (mcpGuideLink) {
			e.preventDefault();
			post({ action: "open_url", url: mcpGuideLink.getAttribute("href") || "" });
			return;
		}
		var actionBtn = e.target && e.target.closest ? e.target.closest("[data-chat-action='open_settings']") : null;
		if (actionBtn) {
			e.preventDefault();
			hideClearConfirm();
			hideRestoreConfirm();
			post({ action: "open_settings" });
			return;
		}
	});

	document.addEventListener("mousedown", function(e) {
		if (!sessionMenu || sessionMenu.hidden) {
			return;
		}
		var insideMenu = sessionMenu.contains(e.target);
		var onRestoreBtn = restore && restore.contains && restore.contains(e.target);
		if (!insideMenu && !onRestoreBtn) {
			hideSessionMenu();
		}
	});

	document.addEventListener("keydown", function(e) {
		if (e.key === "Escape") {
			if (restoreConfirm && !restoreConfirm.hidden) {
				hideRestoreConfirm();
				post({ action: "restore_cancel" });
				return;
			}
			hideClearConfirm();
		}
	});

	if (input) {
		input.addEventListener("input", function() {
			window.autolinkerResizeChatInput(input);
		});
		input.addEventListener("keydown", function(e) {
			if (e.key === "Enter" && !e.ctrlKey && !e.shiftKey) {
				e.preventDefault();
				doSend();
			}
		});
		setTimeout(function() {
			window.autolinkerResizeChatInput(input);
			input.focus();
		}, 0);
	}
})();
</script>
</body>
</html>
