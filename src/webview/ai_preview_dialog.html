<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light only">
<style>
html, body {
	margin: 0;
	padding: 0;
	background: #f4f6f8;
	color: #1f2937;
	font: 14px/1.5 "Microsoft YaHei UI", "Segoe UI", sans-serif;
	height: 100%;
}

* {
	box-sizing: border-box;
}

body {
	padding: 0;
}

h1 {
	margin: 0 0 8px 0;
	font-size: 22px;
}

p {
	margin: 0;
	color: #4b5563;
}

.wrap {
	min-height: 100vh;
	display: flex;
	flex-direction: column;
}

.hero {
	padding: 18px 20px 12px 20px;
	background: #eef3f8;
	border-bottom: 1px solid #d7dce2;
}

.panel {
	flex: 1 1 auto;
	display: flex;
	flex-direction: column;
	min-height: 0;
	padding: 18px 20px;
	background: #fff;
}

.toolbar {
	display: flex;
	justify-content: space-between;
	gap: 12px;
	align-items: center;
	margin-bottom: 12px;
	flex-wrap: wrap;
}

.badge {
	display: inline-flex;
	align-items: center;
	padding: 5px 10px;
	border-radius: 999px;
	background: #e7eef7;
	color: #35506b;
	font: 600 12px/1 "Microsoft YaHei UI", "Segoe UI", sans-serif;
}

.tip {
	font-size: 12px;
	color: #6b7280;
}

.viewer {
	flex: 1 1 auto;
	min-height: 260px;
	margin: 0;
	padding: 16px;
	border: 1px solid #d7dce2;
	border-radius: 12px;
	background: #fbfcfe;
	color: #111827;
	font: 13px/1.6 Consolas, "Courier New", monospace;
	white-space: pre;
	overflow: auto;
	tab-size: 4;
}

.footer {
	display: flex;
	justify-content: flex-end;
	gap: 10px;
	align-items: center;
	padding: 16px 20px;
	border-top: 1px solid #d7dce2;
	background: #fff;
}

.btn {
	border: 1px solid #bfc8d4;
	background: #fff;
	border-radius: 8px;
	padding: 8px 14px;
	cursor: pointer;
	font: 600 13px/1 "Microsoft YaHei UI", "Segoe UI", sans-serif;
}

.btn.primary {
	background: #1565c0;
	border-color: #1565c0;
	color: #fff;
}

.btn.secondary {
	background: #eb6c2d;
	border-color: #eb6c2d;
	color: #fff;
}

.btn[hidden] {
	display: none !important;
}

@media (max-width: 900px) {
	.hero {
		padding: 16px;
	}

	.panel {
		padding: 16px;
	}

	.viewer {
		min-height: 220px;
		padding: 14px;
	}

	.footer {
		padding: 16px;
		flex-direction: column-reverse;
		align-items: stretch;
	}

	.footer .btn {
		width: 100%;
	}
}
</style>
</head>
<body>
<div class="wrap">
	<div class="hero">
		<h1 id="dialogTitle">AutoLinker AI &#x786E;&#x8BA4;</h1>
		<p id="dialogSubtitle">&#x8BF7;&#x786E;&#x8BA4;&#x4EE5;&#x4E0B;&#x5185;&#x5BB9;&#xFF0C;&#x786E;&#x8BA4;&#x540E;&#x5C06;&#x7EE7;&#x7EED;&#x6267;&#x884C;&#x3002;</p>
	</div>
	<div class="panel">
		<div class="toolbar">
			<span class="badge">&#x53EA;&#x8BFB;&#x9884;&#x89C8;</span>
			<span class="tip">&#x5185;&#x5BB9;&#x4F1A;&#x4FDD;&#x7559;&#x539F;&#x59CB;&#x6362;&#x884C;&#x4E0E;&#x7F29;&#x8FDB;&#x3002;</span>
		</div>
		<pre id="contentView" class="viewer"></pre>
	</div>
	<div class="footer">
		<button id="cancelBtn" class="btn" type="button">&#x53D6;&#x6D88;</button>
		<button id="secondaryBtn" class="btn secondary" type="button" hidden>&#x6B21;&#x8981;&#x64CD;&#x4F5C;</button>
		<button id="primaryBtn" class="btn primary" type="button">&#x786E;&#x5B9A;</button>
	</div>
</div>
<script>
const initialPreview = {
	title: "",
	content: "",
	primaryText: "\u786E\u5B9A",
	secondaryText: ""
};

function $(id) {
	return document.getElementById(id);
}

function post(payload) {
	if (window.chrome && window.chrome.webview) {
		window.chrome.webview.postMessage(JSON.stringify(payload));
	}
}

function setText(id, value) {
	const el = $(id);
	if (el) {
		el.textContent = value || "";
	}
}

function applyPreview(preview) {
	const next = preview || initialPreview;
	setText("dialogTitle", next.title || "AutoLinker AI Preview");
	setText(
		"dialogSubtitle",
		next.secondaryText
			? "\u8BF7\u786E\u8BA4\u4EE5\u4E0B\u5185\u5BB9\uFF0C\u53EF\u4EE5\u9009\u62E9\u4E0D\u540C\u7684\u540E\u7EED\u52A8\u4F5C\u3002"
			: "\u8BF7\u786E\u8BA4\u4EE5\u4E0B\u5185\u5BB9\uFF0C\u786E\u8BA4\u540E\u5C06\u7EE7\u7EED\u6267\u884C\u3002");
	setText("contentView", next.content || "");

	const primary = $("primaryBtn");
	if (primary) {
		primary.textContent = next.primaryText || "\u786E\u5B9A";
	}

	const secondary = $("secondaryBtn");
	if (secondary) {
		const hasSecondary = !!(next.secondaryText && next.secondaryText.length);
		secondary.hidden = !hasSecondary;
		if (hasSecondary) {
			secondary.textContent = next.secondaryText;
		}
	}
}

window.autolinkerApplyPreview = function(preview) {
	applyPreview(preview);
};

window.autolinkerFocusPrimary = function() {
	if ($("primaryBtn")) {
		$("primaryBtn").focus();
	}
};

$("primaryBtn").addEventListener("click", function() {
	post({ action: "primary" });
});

$("secondaryBtn").addEventListener("click", function() {
	post({ action: "secondary" });
});

$("cancelBtn").addEventListener("click", function() {
	post({ action: "cancel" });
});

document.addEventListener("keydown", function(evt) {
	if (evt.key === "Escape") {
		evt.preventDefault();
		post({ action: "cancel" });
		return;
	}
	if (evt.key === "Enter" && !evt.shiftKey && !evt.ctrlKey && !evt.altKey && !evt.metaKey) {
		evt.preventDefault();
		post({ action: "primary" });
	}
});

applyPreview(initialPreview);
</script>
</body>
</html>
