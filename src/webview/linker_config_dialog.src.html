<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light only">
<style>
/*__AUTOLINKER_AI_CONFIG_CSS__*/
</style>
</head>
<body class="font-sans text-[13px]">
<div class="flex min-h-full flex-col">
	<header class="border-b border-slate-200 bg-white px-5 py-3">
		<div class="flex items-center justify-between gap-3">
			<h1 class="text-lg font-semibold leading-6 text-slate-950">AutoLinker 链接器设置</h1>
			<span id="linkerCountBadge" class="rounded border border-slate-200 bg-slate-50 px-2 py-1 text-[12px] text-slate-500">0 个链接器</span>
		</div>
	</header>

	<main class="flex flex-1 flex-col bg-white p-5">
		<div class="mb-3 flex flex-wrap items-end gap-2">
			<div class="min-w-[200px] flex-1">
				<label for="linkerSelect" class="ui-label">当前链接器</label>
				<select id="linkerSelect" class="ui-select"></select>
			</div>
			<button id="addBtn" class="ui-btn" type="button">添加</button>
			<button id="renameBtn" class="ui-btn" type="button">重命名</button>
			<button id="deleteBtn" class="ui-btn" type="button">删除</button>
		</div>

		<div class="flex min-h-0 flex-1 flex-col">
			<div class="mb-1.5 flex items-center justify-between">
				<label for="linkerContent" class="ui-label mb-0">链接器内容（link.ini）</label>
				<span class="text-[12px] text-slate-400">保存时以 GBK/ANSI 编码写入，避免中文乱码</span>
			</div>
			<textarea id="linkerContent" class="ui-textarea min-h-0 flex-1 font-mono" spellcheck="false" placeholder="选择或添加一个链接器后在此编辑其 link.ini 内容。"></textarea>
		</div>
	</main>

	<footer class="flex items-center justify-between gap-2 border-t border-slate-200 bg-white px-5 py-3">
		<span id="statusText" class="text-[12px] text-slate-500"></span>
		<div class="flex gap-2">
			<button id="cancelBtn" class="ui-btn" type="button">取消</button>
			<button id="saveBtn" class="ui-btn ui-btn-primary" type="button" disabled>保存</button>
		</div>
	</footer>
</div>
<script>
/*__AUTOLINKER_PRELINE_JS__*/
</script>
<script>
// state
var _linkers = [];        // [{name, content}]
var _initialSnapshot = "";
var _selectedIndex = -1;
var _dirty = false;
var _defaultContent = "";

function $(id) { return document.getElementById(id); }

function post(payload) {
	if (window.chrome && window.chrome.webview) {
		window.chrome.webview.postMessage(JSON.stringify(payload));
	}
}

function snapshot() {
	return JSON.stringify(_linkers.map(function (l) {
		return { name: l.name, content: l.content, isDefault: !!l.isDefault };
	}));
}

function setStatus(text) {
	$("statusText").textContent = text || "";
}

function recomputeDirty() {
	_dirty = snapshot() !== _initialSnapshot;
	$("saveBtn").disabled = !_dirty;
}
</script>
<script>
function renderSelect() {
	var sel = $("linkerSelect");
	sel.innerHTML = "";
	_linkers.forEach(function (l, i) {
		var opt = document.createElement("option");
		opt.value = String(i);
		opt.textContent = l.isDefault ? (l.name + "（默认）") : l.name;
		sel.appendChild(opt);
	});
	if (_selectedIndex >= 0 && _selectedIndex < _linkers.length) {
		sel.value = String(_selectedIndex);
	}
	$("linkerCountBadge").textContent = _linkers.length + " 个链接器";
	var empty = _linkers.length === 0;
	var current = (_selectedIndex >= 0 && _selectedIndex < _linkers.length) ? _linkers[_selectedIndex] : null;
	var readonly = !current || !!current.isDefault;
	$("renameBtn").disabled = empty || readonly;
	$("deleteBtn").disabled = empty || readonly;
	$("linkerContent").disabled = empty;
	$("linkerContent").readOnly = !!readonly;
}

function showSelected() {
	var area = $("linkerContent");
	if (_selectedIndex >= 0 && _selectedIndex < _linkers.length) {
		area.value = _linkers[_selectedIndex].content || "";
	} else {
		area.value = "";
	}
}

function selectIndex(index) {
	_selectedIndex = index;
	renderSelect();
	showSelected();
}

function nameExists(name, exceptIndex) {
	var lower = name.toLowerCase();
	return _linkers.some(function (l, i) {
		return i !== exceptIndex && l.name.toLowerCase() === lower;
	});
}
</script>
<script>
function sanitizeName(name) {
	return (name || "").replace(/[\\/:*?"<>|]/g, "_").trim();
}

function promptName(title, current) {
	var input = window.prompt(title, current || "");
	if (input === null) {
		return null;
	}
	var name = sanitizeName(input);
	if (!name) {
		window.alert("名称不能为空。");
		return null;
	}
	return name;
}

function onAdd() {
	var name = promptName("输入新链接器名称：", "");
	if (name === null) { return; }
	if (nameExists(name, -1)) {
		window.alert("已存在同名链接器：" + name);
		return;
	}
	_linkers.push({ name: name, content: _defaultContent || "" });
	selectIndex(_linkers.length - 1);
	recomputeDirty();
	$("linkerContent").focus();
}

function onRename() {
	if (_selectedIndex < 0) { return; }
	if (_linkers[_selectedIndex].isDefault) { return; }
	var cur = _linkers[_selectedIndex].name;
	var name = promptName("重命名链接器：", cur);
	if (name === null || name === cur) { return; }
	if (nameExists(name, _selectedIndex)) {
		window.alert("已存在同名链接器：" + name);
		return;
	}
	_linkers[_selectedIndex].name = name;
	renderSelect();
	recomputeDirty();
}

function onDelete() {
	if (_selectedIndex < 0) { return; }
	if (_linkers[_selectedIndex].isDefault) { return; }
	var cur = _linkers[_selectedIndex].name;
	if (!window.confirm("确定删除链接器 \"" + cur + "\" 吗？保存后对应的 .ini 文件将被删除。")) {
		return;
	}
	_linkers.splice(_selectedIndex, 1);
	var next = _linkers.length === 0 ? -1 : Math.min(_selectedIndex, _linkers.length - 1);
	selectIndex(next);
	recomputeDirty();
}
</script>
<script>
function onContentInput() {
	if (_selectedIndex >= 0 && _selectedIndex < _linkers.length) {
		if (_linkers[_selectedIndex].isDefault) { return; }
		_linkers[_selectedIndex].content = $("linkerContent").value;
		recomputeDirty();
	}
}

function onSave() {
	if (!_dirty) { return; }
	$("saveBtn").disabled = true;
	setStatus("正在保存…");
	post({
		action: "save",
		data: {
			linkers: _linkers.filter(function (l) {
				return !l.isDefault;
			}).map(function (l) {
				return { name: l.name, content: l.content, isDefault: false };
			})
		}
	});
}

// C++ -> JS: inject linker list
window.autolinkerApplyLinkers = function (payload) {
	_defaultContent = (payload && payload.defaultContent) ? payload.defaultContent : "";
	_linkers = (payload && payload.linkers ? payload.linkers : []).map(function (l) {
		return { name: l.name || "", content: l.content || "", isDefault: !!l.isDefault };
	});
	_initialSnapshot = snapshot();
	_selectedIndex = _linkers.length > 0 ? 0 : -1;
	renderSelect();
	showSelected();
	recomputeDirty();
	setStatus("");
};

// C++ -> JS: save result
window.autolinkerLinkerSaveResult = function (result) {
	if (result && result.ok) {
		_initialSnapshot = snapshot();
		recomputeDirty();
		setStatus(result.message || "已保存");
	} else {
		$("saveBtn").disabled = false;
		setStatus((result && result.message) ? result.message : "保存失败");
		if (result && result.message) { window.alert(result.message); }
	}
};

document.addEventListener("DOMContentLoaded", function () {
	$("linkerSelect").addEventListener("change", function (e) {
		selectIndex(parseInt(e.target.value, 10));
	});
	$("addBtn").addEventListener("click", onAdd);
	$("renameBtn").addEventListener("click", onRename);
	$("deleteBtn").addEventListener("click", onDelete);
	$("linkerContent").addEventListener("input", onContentInput);
	$("saveBtn").addEventListener("click", onSave);
	$("cancelBtn").addEventListener("click", function () { post({ action: "cancel" }); });
});
</script>
</body>
</html>
